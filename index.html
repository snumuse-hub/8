<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아침 연습은 수석합격이지 !! 출석체크</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: white; border-radius: 20px;
  padding: 36px 28px 28px;
  width: 100%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(80,100,200,0.12);
  text-align: center;
}
.school { font-size: 13px; color: #888; margin-bottom: 4px; }
h1 { font-size: 20px; font-weight: 700; color: #222; line-height: 1.4; margin-bottom: 8px; }
.class-badge {
  display: inline-block;
  background: #e8edff; color: #4a6cf7;
  font-size: 14px; font-weight: 600;
  padding: 4px 14px; border-radius: 20px; margin-bottom: 10px;
}
.date-info { font-size: 13px; color: #aaa; margin-bottom: 16px; }

/* 트로피 */
.trophy-loading {
  width: 260px; height: 260px;
  margin: 0 auto 14px;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f5; border-radius: 32px;
  color: #aaa; font-size: 14px;
}
.trophy-wrap {
  position: relative; width: 260px; height: 260px;
  margin: 0 auto 14px;
  display: none;
  border-radius: 32px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
}
/* 검정 베이스 */
.trophy-base {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0);
  z-index: 1;
}
/* 채워지는 레이어 */
.fill-wrap {
  position: absolute; inset: 0;
  overflow: hidden;
  z-index: 2;
}
.fill-inner {
  position: absolute; left: 0; right: 0; bottom: 0; height: 0%;
  overflow: hidden;
  transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
}
.fill-inner img {
  position: absolute; bottom: 0; left: 0;
  width: 260px; height: 260px;
  object-fit: cover;
  filter: saturate(1.8) contrast(1.15) brightness(1.05);
}

/* 반짝이 shimmer 레이어 */
.shimmer-layer {
  position: absolute; inset: 0;
  z-index: 3;
  pointer-events: none;
  background: linear-gradient(
    115deg,
    transparent 0%,
    transparent 40%,
    rgba(255,255,200,0.45) 50%,
    transparent 60%,
    transparent 100%
  );
  background-size: 200% 100%;
  animation: shimmer 2.2s infinite linear;
  opacity: 0;
  transition: opacity 0.4s;
}
.shimmer-layer.active { opacity: 1; }

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* 100% 반짝임 */
@keyframes trophyShine {
  0%   { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
  25%  { box-shadow: 0 0 40px 10px rgba(255,215,0,0.7), 0 0 80px 20px rgba(255,165,0,0.4); }
  50%  { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
  75%  { box-shadow: 0 0 30px 8px rgba(255,215,0,0.5), 0 0 60px 15px rgba(255,165,0,0.3); }
  100% { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
}
.trophy-wrap.full-shine {
  animation: trophyShine 1.2s ease-in-out 3;
}

.plus-tag {
  position: absolute; top: 8px; right: 8px;
  font-size: 24px; font-weight: 700; color: #FFD700;
  opacity: 0; pointer-events: none; z-index: 10;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
@keyframes floatUp {
  0%   { transform: translateY(0);     opacity: 1; }
  100% { transform: translateY(-50px); opacity: 0; }
}

/* 출석 바 */
.count-num   { font-size: 32px; font-weight: 700; color: #222; margin-bottom: 4px; }
.count-label { font-size: 13px; color: #888; margin-bottom: 8px; }
.bar-bg { background: #f0f0f0; border-radius: 99px; height: 12px; overflow: hidden; margin-bottom: 6px; }
.bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg,#B8860B,#FFD700);
  width: 0%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative; overflow: hidden;
}
.bar-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: barShimmer 1.5s infinite;
}
@keyframes barShimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.count-goal { font-size: 12px; color: #aaa; margin-bottom: 18px; }

/* 폼 */
.form-area label { display: block; text-align: left; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 8px; }
.form-area input {
  width: 100%; padding: 14px 16px; font-size: 18px;
  border: 2px solid #e0e5f0; border-radius: 12px; outline: none;
  text-align: center; letter-spacing: 2px; transition: border 0.2s;
}
.form-area input:focus { border-color: #4a6cf7; }
.hint { font-size: 12px; color: #bbb; margin: 8px 0 14px; }
.err  { font-size: 13px; color: #e53e3e; margin-bottom: 8px; display: none; }
.btn-submit {
  width: 100%; padding: 15px; background: #4a6cf7; color: white;
  font-size: 17px; font-weight: 700; border: none; border-radius: 14px;
  cursor: pointer; transition: background 0.2s;
}
.btn-submit:hover    { background: #3558e8; }
.btn-submit:disabled { background: #b0b8d0; cursor: not-allowed; }

/* 팝업 */
.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center; justify-content: center;
}
.popup-overlay.show { display: flex; }
.popup-box {
  background: white; border-radius: 24px;
  padding: 36px 28px 28px;
  width: 90%; max-width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.pop-emoji { font-size: 48px; margin-bottom: 12px; }
.pop-name  { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 4px; }
.pop-msg   { font-size: 15px; color: #4a6cf7; font-weight: 600; margin-bottom: 4px; }
.pop-time  { font-size: 13px; color: #aaa; margin-bottom: 16px; }
.congrats-box {
  display: none; margin: 12px 0 16px; padding: 16px;
  background: linear-gradient(135deg,#fffbea,#fff8dc);
  border: 1.5px solid #DAA520; border-radius: 14px;
  font-size: 16px; font-weight: 700; color: #222; line-height: 2;
}
.congrats-box .gold  { color: #B8860B; font-size: 20px; }
.congrats-box .small { font-size: 14px; color: #666; font-weight: 500; }
.btn-close {
  width: 100%; padding: 13px; background: #4a6cf7; color: white;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-close:hover { background: #3558e8; }

/* 파티클 */
#particles { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
.p { position: absolute; animation: fall 1.8s ease-in forwards; opacity: 0; }
@keyframes fall {
  0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="particles"></div>

<div class="card">
  <div class="school">창원예술학교</div>
  <h1>아침 연습은 수석합격이지 !!<br>출석체크</h1>
  <div class="class-badge" id="classBadge">-- 반</div>
  <div class="date-info" id="dateInfo"></div>

  <div class="trophy-loading" id="trophyLoading">🏆 불러오는 중...</div>
  <div class="trophy-wrap" id="trophyWrap">
    <div class="plus-tag" id="plusTag">+1</div>
    <img class="trophy-base" id="baseImg" src="" alt="트로피"/>
    <div class="fill-wrap">
      <div class="fill-inner" id="fillInner">
        <img id="fillImg" src="" alt=""/>
      </div>
    </div>
    <div class="shimmer-layer" id="shimmerLayer"></div>
  </div>

  <div class="count-num"   id="countNum">0일</div>
  <div class="count-label">이번 달 출석 횟수</div>
  <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
  <div class="count-goal"  id="countGoal">목표: 30일 중 0일 달성</div>

  <div class="form-area" id="formArea">
    <label for="nameInput">이름을 입력하세요</label>
    <input type="text" id="nameInput" placeholder="최진수" maxlength="10" autocomplete="off">
    <div class="hint">본인의 실명을 정확히 입력해 주세요</div>
    <div class="err" id="errMsg">이름을 입력해 주세요.</div>
    <button class="btn-submit" id="submitBtn" onclick="doSubmit()">출석 완료 ✓</button>
  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popup">
  <div class="popup-box">
    <div class="pop-emoji" id="popEmoji">✅</div>
    <div class="pop-name"  id="popName"></div>
    <div class="pop-msg"   id="popMsg"></div>
    <div class="pop-time"  id="popTime"></div>
    <div class="congrats-box" id="congratsBox">
      <div id="congratsText"></div>
    </div>
    <button class="btn-close" onclick="closePopup()">확인 ✓</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz-ct89ZtdQGTojU2SxQbkDuNjTjKOvaoLvTvvTEVnAejgUp58jf9J-EPenlwSgXYlPgw/exec";
const GAS_IMG = "https://script.google.com/macros/s/AKfycbzsJN1KXDx0dngWgz4bRCmCGCbeEemO-qqUJ5_1sGhZJoi9PvymN8eBcx3AYLy9JeND/exec";
const GOAL = 30;
let currentCount = 0;

const params = new URLSearchParams(location.search);
document.getElementById('classBadge').textContent = params.get('class') || '미지정';
const d = new Date(), dn = ['일','월','화','수','목','금','토'];
document.getElementById('dateInfo').textContent =
  `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${dn[d.getDay()]})`;

// 트로피 이미지 로드
(async () => {
  try {
    const r = await fetch(GAS_IMG);
    const j = await r.json();
    document.getElementById('baseImg').src = j.data;
    document.getElementById('fillImg').src  = j.data;
    document.getElementById('trophyLoading').style.display = 'none';
    document.getElementById('trophyWrap').style.display    = 'block';
  } catch(e) {
    document.getElementById('trophyLoading').textContent = '이미지 로드 실패 😢';
  }
})();

function getAttendanceStatusClient_(dateObj) {
  const seconds = dateObj.getHours() * 3600 + dateObj.getMinutes() * 60 + dateObj.getSeconds();
  const goalStart = 7 * 3600;                 // 07:00:00
  const goalEnd   = 8 * 3600;                 // 08:00:00
  const effortEnd = 8 * 3600 + 30 * 60;       // 08:30:00

  if (seconds >= goalStart && seconds <= goalEnd) return 'goal';
  if (seconds > goalEnd && seconds <= effortEnd) return 'effort';
  return 'invalid';
}

async function doSubmit() {
  const name  = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('errMsg');
  if (!name) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '등록 중...';

  const now = new Date();
  const status = getAttendanceStatusClient_(now);

  // 출석 가능 시간이 아니면 저장하지 않고 안내만 표시
  if (status === 'invalid') {
    showResult(name, now, status);
    return;
  }

  try {
    await fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name,
        className: params.get('class') || '미지정',
        date: now.toLocaleDateString('ko-KR'),
        time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        timestamp: now.toISOString(),
        status
      })
    });
  } catch(e) {}

  if (status === 'goal') currentCount++;
  showResult(name, now, status);
}

let particleTimer = null;

function showResult(name, time, status = 'goal') {
  const nameLabel = name + '님';
  const pct   = Math.min(currentCount / GOAL * 100, 100);
  const is100 = currentCount >= GOAL;

  document.getElementById('popName').textContent = nameLabel;
  document.getElementById('popTime').textContent =
    '등록 시각: ' + time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  if (status === 'goal') {
    document.getElementById('popEmoji').textContent = is100 ? '🏆' : '✅';
    document.getElementById('popMsg').textContent   = is100
      ? '30일 개근 달성! 🎉'
      : '목표출석 달성! 수석합격 +1 상승하셨습니다 🎯';
  } else if (status === 'effort') {
    document.getElementById('popEmoji').textContent = '👍';
    document.getElementById('popMsg').textContent   = '노력은 인정해드려요. 내일은 08:00 이전에 도전해보세요.';
  } else {
    document.getElementById('popEmoji').textContent = '⛔';
    document.getElementById('popMsg').textContent   = '출석 입력시간이 아닙니다. 출석 가능 시간은 07:00~08:30입니다.';
    document.getElementById('popTime').textContent  =
      '현재 시각: ' + time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }

  if (is100 && status === 'goal') {
    document.getElementById('congratsText').innerHTML =
      `포기하지 않은 30일,<br>` +
      `<span class="gold">${nameLabel}</span> 이미 성공했습니다! 🏆<br>` +
      `<span class="small">당신의 노력이 자랑스럽습니다 ✨</span>`;
    document.getElementById('congratsBox').style.display = 'block';
  } else {
    document.getElementById('congratsBox').style.display = 'none';
  }
  document.getElementById('popup').classList.add('show');

  // 목표출석일 때만 트로피와 달성률 증가
  if (status === 'goal') {
    setTimeout(() => {
      document.getElementById('fillInner').style.height = pct + '%';
      document.getElementById('barFill').style.width   = pct + '%';
      document.getElementById('countNum').textContent  = currentCount + '일';
      document.getElementById('countGoal').textContent = `목표: ${GOAL}일 중 ${currentCount}일 달성`;

      if (currentCount > 0) {
        document.getElementById('shimmerLayer').classList.add('active');
      }

      if (is100) {
        const wrap = document.getElementById('trophyWrap');
        wrap.classList.remove('full-shine');
        void wrap.offsetWidth;
        wrap.classList.add('full-shine');
      }
    }, 100);

    const plus = document.getElementById('plusTag');
    plus.style.animation = 'none'; void plus.offsetWidth;
    plus.style.animation = 'floatUp 1.2s ease-out forwards';

    is100 ? repeatParticles() : spawnParticles(40);
  } else if (status === 'effort') {
    spawnParticles(18);
  }
}

function repeatParticles() {
  spawnParticles(80);
  particleTimer = setInterval(() => spawnParticles(80), 2600);
}

function spawnParticles(n) {
  const el = document.getElementById('particles');
  el.innerHTML = '';
  const cols = ['#DAA520','#FFD700','#B8860B','#FFF8DC','#4a6cf7','#ff9999','#ff6b6b','#a78bfa','#5ce65c'];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*15}%;
      background:${cols[~~(Math.random()*cols.length)]};
      animation-delay:${Math.random()}s;
      animation-duration:${1.4+Math.random()*1.2}s;
      width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;
      border-radius:${Math.random()>.5?'3px':'50%'};
    `;
    el.appendChild(p);
  }
}

function closePopup() {
  clearInterval(particleTimer);
  document.getElementById('particles').innerHTML = '';
  document.getElementById('popup').classList.remove('show');
  document.getElementById('nameInput').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '출석 완료 ✓';
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSubmit();
});
</script>
</body>
</html>
