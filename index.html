<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아침 연습은 수석합격이지 !! 출석체크</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', sans-serif;
  background: #f0f4ff; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.card {
  background: white; border-radius: 20px; padding: 36px 28px 28px;
  width: 100%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(80,100,200,0.12); text-align: center;
}
.school { font-size: 13px; color: #888; margin-bottom: 4px; }
h1 { font-size: 20px; font-weight: 700; color: #222; line-height: 1.4; margin-bottom: 12px; }
.date-info { font-size: 13px; color: #aaa; margin-bottom: 16px; }

/* 트로피 */
.trophy-loading {
  width: 260px; height: 300px; margin: 0 auto 14px;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f5; border-radius: 32px; color: #aaa; font-size: 14px;
}
.trophy-wrap {
  position: relative; width: 260px; height: 300px;
  margin: 0 auto 14px; display: none;
  border-radius: 32px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18); background: black;
}
.trophy-base {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: fill; filter: brightness(0); z-index: 1;
}
.fill-wrap { position: absolute; inset: 0; overflow: hidden; z-index: 2; }
.fill-inner {
  position: absolute; left: 0; right: 0; bottom: 0; height: 0%;
  overflow: hidden; transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
}
.fill-inner img {
  position: absolute; bottom: 0; left: 0; width: 260px; height: 300px;
  object-fit: fill; filter: saturate(1.8) contrast(1.15) brightness(1.05);
}
.shimmer-layer {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(115deg, transparent 40%, rgba(255,255,200,0.45) 50%, transparent 60%);
  background-size: 200% 100%; animation: shimmer 2.2s infinite linear; opacity: 0; transition: opacity 0.4s;
}
.shimmer-layer.active { opacity: 1; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes trophyShine {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
  25%,75%  { box-shadow: 0 0 40px 10px rgba(255,215,0,0.7), 0 0 80px 20px rgba(255,165,0,0.4); }
}
.trophy-wrap.full-shine { animation: trophyShine 1.2s ease-in-out 3; }
.plus-tag {
  position: absolute; top: 8px; right: 8px; font-size: 24px; font-weight: 700;
  color: #FFD700; opacity: 0; pointer-events: none; z-index: 10;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
@keyframes floatUp {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-50px); opacity: 0; }
}

/* 출석 바 */
.count-num   { font-size: 32px; font-weight: 700; color: #222; margin-bottom: 4px; }
.count-label { font-size: 13px; color: #888; margin-bottom: 8px; }
.bar-bg { background: #f0f0f0; border-radius: 99px; height: 12px; overflow: hidden; margin-bottom: 6px; position: relative; }
.bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg,#B8860B,#FFD700);
  width: 0%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden;
}
.bar-fill::after {
  content:''; position: absolute; inset: 0;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation: barShimmer 1.5s infinite;
}
@keyframes barShimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
.count-goal { font-size: 12px; color: #aaa; margin-bottom: 18px; }

/* 폼 */
.form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch; }
.form-row select {
  height: 56px; flex: 0 0 70px; padding: 0 8px; font-size: 15px; font-weight: 600;
  border: 2px solid #e0e5f0; border-radius: 12px; outline: none;
  background: white; color: #333; text-align: center;
}
.form-row input {
  flex: 1; min-width: 0; height: 56px; padding: 0 16px; font-size: 17px;
  border: 2px solid #e0e5f0; border-radius: 12px; outline: none;
  text-align: center; letter-spacing: 2px; transition: border 0.2s;
}
.form-row input:focus, .form-row select:focus { border-color: #4a6cf7; }
.hint { font-size: 12px; color: #bbb; margin-bottom: 12px; }
.err  { font-size: 13px; color: #e53e3e; margin-bottom: 8px; display: none; }
.btn-submit {
  width: 100%; padding: 15px; background: #4a6cf7; color: white;
  font-size: 17px; font-weight: 700; border: none; border-radius: 14px;
  cursor: pointer; transition: background 0.2s; margin-bottom: 10px;
}
.btn-submit:hover { background: #3558e8; }
.btn-submit:disabled { background: #b0b8d0; cursor: not-allowed; }
.btn-record {
  width: 100%; padding: 12px; background: transparent;
  border: 1.5px solid #e0e5f0; border-radius: 14px;
  color: #4a6cf7; font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-record:hover { background: #f0f4ff; }

/* 팝업 공통 */
.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center;
}
.popup-overlay.show { display: flex; }
.popup-box {
  background: white; border-radius: 24px; padding: 32px 24px 24px;
  width: 90%; max-width: 360px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 85vh; overflow-y: auto;
}
@keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

/* 출석완료 팝업 */
.pop-emoji { font-size: 48px; margin-bottom: 12px; }
.pop-name  { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 4px; }
.pop-msg   { font-size: 15px; color: #4a6cf7; font-weight: 600; margin-bottom: 4px; }
.pop-time  { font-size: 13px; color: #aaa; margin-bottom: 16px; }
.congrats-box {
  display: none; margin: 12px 0 16px; padding: 16px;
  background: linear-gradient(135deg,#fffbea,#fff8dc);
  border: 1.5px solid #DAA520; border-radius: 14px;
  font-size: 16px; font-weight: 700; color: #222; line-height: 2;
}
.congrats-box .gold  { color: #B8860B; font-size: 20px; }
.congrats-box .small { font-size: 14px; color: #666; font-weight: 500; }
.btn-close {
  width: 100%; padding: 13px; background: #4a6cf7; color: white;
  border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
  margin-bottom: 8px;
}
.btn-close:hover { background: #3558e8; }
.btn-view-record {
  width: 100%; padding: 11px; background: transparent;
  border: 1.5px solid #e0e5f0; border-radius: 14px;
  color: #4a6cf7; font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-view-record:hover { background: #f0f4ff; }

/* 누가기록 팝업 */
.rec-title { font-size: 18px; font-weight: 700; color: #222; margin-bottom: 4px; }
.rec-sub   { font-size: 13px; color: #888; margin-bottom: 16px; }
.rec-stats {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.rec-stat {
  flex: 1; background: #f8f9ff; border-radius: 12px; padding: 12px 8px; text-align: center;
}
.rec-stat .n { font-size: 22px; font-weight: 700; color: #4a6cf7; }
.rec-stat .l { font-size: 11px; color: #888; margin-top: 2px; }
.rec-stat.gold .n { color: #B8860B; }
.rec-stat.red  .n { color: #e53e3e; }

.record-list { max-height: 220px; overflow-y: auto; margin-bottom: 16px; text-align: left; }
.record-item {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; background: #f8f9ff;
}
.record-item .datetime { flex: 1; min-width: 0; }
.record-item .date { display: block; font-size: 13px; color: #444; font-weight: 600; line-height: 1.35; white-space: nowrap; }
.record-item .time { display: block; font-size: 12px; color: #888; line-height: 1.35; white-space: nowrap; }
.badge-on   { background: #e8ffee; color: #2d9b4e; font-size: 11px; font-weight: 600; padding: 5px 9px; border-radius: 20px; white-space: nowrap; line-height: 1; flex: 0 0 auto; }
.badge-late { background: #fff3e0; color: #e07800; font-size: 11px; font-weight: 600; padding: 5px 9px; border-radius: 20px; white-space: nowrap; line-height: 1; flex: 0 0 auto; }
.empty-msg  { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }
.loading-msg{ text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }

/* 파티클 */
#particles { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
.p { position: absolute; animation: fall 1.8s ease-in forwards; opacity: 0; }
@keyframes fall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="particles"></div>

<div class="card">
  <div class="school">창원예술학교</div>
  <h1>아침 연습은 수석합격이지 !!<br>출석체크</h1>
  <div class="date-info" id="dateInfo"></div>

  <div class="trophy-loading" id="trophyLoading">🏆 불러오는 중...</div>
  <div class="trophy-wrap" id="trophyWrap">
    <div class="plus-tag" id="plusTag">+1</div>
    <img class="trophy-base" id="baseImg" src="" alt="트로피"/>
    <div class="fill-wrap">
      <div class="fill-inner" id="fillInner">
        <img id="fillImg" src="" alt=""/>
      </div>
    </div>
    <div class="shimmer-layer" id="shimmerLayer"></div>
  </div>

  <div class="count-num"   id="countNum">0일</div>
  <div class="count-label">이번 달 목표 출석 횟수</div>
  <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
  <div class="count-goal"  id="countGoal">목표: 30일 중 0일 달성</div>

  <div class="form-row">
    <select id="classSelect">
      <option value="3반">3반</option>
      <option value="4반">4반</option>
    </select>
    <input type="text" id="nameInput" placeholder="이름 입력" maxlength="10" autocomplete="off">
  </div>
  <div class="hint">반과 이름을 선택/입력하세요</div>
  <div class="err" id="errMsg">이름을 입력해 주세요.</div>
  <button class="btn-submit" id="submitBtn" onclick="doSubmit()">출석 완료 ✓</button>
  <button class="btn-record" onclick="openRecord()">📋 내 출석 기록 보기</button>
</div>

<!-- 중복 출첵 팝업 -->
<div class="popup-overlay" id="alreadyPopup">
  <div class="popup-box">
    <div class="pop-emoji">✅</div>
    <div class="pop-name" style="font-size:18px;">이미 오늘 출석했습니다!</div>
    <div class="pop-time" style="font-size:14px; color:#888; margin-top:10px;">오늘 출석은 1회만 인정됩니다.</div>
    <button class="btn-close" style="margin-top:20px;" onclick="document.getElementById('alreadyPopup').classList.remove('show')">확인</button>
  </div>
</div>

<!-- 입력불가 팝업 -->
<div class="popup-overlay" id="blockPopup">
  <div class="popup-box">
    <div class="pop-emoji">⛔</div>
    <div class="pop-name" style="font-size:18px;">출석 입력시간이 아닙니다.</div>
    <div class="pop-time" style="font-size:15px; color:#e53e3e; margin-top:10px;">출석 가능 시간 : 07:00 ~ 08:30</div>
    <button class="btn-close" style="margin-top:20px;" onclick="document.getElementById('blockPopup').classList.remove('show')">확인</button>
  </div>
</div>

<!-- 출석완료 팝업 -->
<div class="popup-overlay" id="popup">
  <div class="popup-box">
    <div class="pop-emoji" id="popEmoji">✅</div>
    <div class="pop-name"  id="popName"></div>
    <div class="pop-msg"   id="popMsg"></div>
    <div class="pop-time"  id="popTime"></div>
    <div class="congrats-box" id="congratsBox">
      <div id="congratsText"></div>
    </div>
    <button class="btn-close" onclick="closePopup()">확인 ✓</button>
    <button class="btn-view-record" onclick="closePopup(); openRecord();">📋 내 기록 보기</button>
  </div>
</div>

<!-- 누가기록 팝업 -->
<div class="popup-overlay" id="recordPopup">
  <div class="popup-box">
    <div class="pop-emoji">📋</div>
    <div class="rec-title" id="recTitle">내 출석 기록</div>
    <div class="rec-sub"   id="recSub"></div>
    <div class="rec-stats" id="recStats" style="display:none;">
      <div class="rec-stat">
        <div class="n" id="recTotal">0</div>
        <div class="l">총 기록 📋</div>
      </div>
      <div class="rec-stat gold">
        <div class="n" id="recOnTime">0</div>
        <div class="l">목표 출석 🏆</div>
      </div>
      <div class="rec-stat red">
        <div class="n" id="recLate">0</div>
        <div class="l">노력 👍</div>
      </div>
    </div>
    <div class="record-list" id="recordList">
      <div class="loading-msg">조회 중...</div>
    </div>
    <button class="btn-close" onclick="closeRecord()">닫기</button>
  </div>
</div>

// 시간대 체크
function getTimeStatus() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const total = h * 60 + m;
  if (total < 7 * 60) return 'block';           // 07:00 이전
  if (total <= 8 * 60) return 'ontime';          // 07:00 ~ 08:00
  if (total <= 8 * 60 + 30) return 'effort';     // 08:01 ~ 08:30
  return 'block';                                // 08:31 이후
}

// 출석 제출
async function doSubmit() {
  const name  = document.getElementById('nameInput').value.trim();
  const cls   = document.getElementById('classSelect').value;
  const errEl = document.getElementById('errMsg');
  if (!name) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  // 시간 체크
  const status = getTimeStatus();
  if (status === 'block') {
    document.getElementById('blockPopup').classList.add('show');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '등록 중...';

  lastName = name; lastClass = cls;
  const now = new Date();

  let postResult = null;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        name, className: cls,
        date: Intl.DateTimeFormat('ko-KR').format(now),
        time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        timestamp: now.toISOString()
      })
    });
    postResult = await res.json();
  } catch(e) {}

  // ★ 중복 출첵 처리
  if (postResult && postResult.alreadyChecked) {
    btn.disabled = false;
    btn.textContent = '출석 완료 ✓';
    document.getElementById('alreadyPopup').classList.add('show');
    return;
  }

  // 저장 직후 학생별 누적 기록을 서버에서 다시 조회해 화면을 맞춘다.
  const studentStats = await getStudentStatsAfterSubmit(name, cls);
  currentCount = studentStats.goalCount;
  showResult(name, cls, now, studentStats);
}

async function fetchStudentRecord(name, cls) {
  const url = `${GAS_URL}?type=student&name=${encodeURIComponent(name)}&_=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  return await r.json();
}

function isOnTimeByDate(dateObj) {
  const h = dateObj.getHours();
  const m = dateObj.getMinutes();
  const total = h * 60 + m;
  // 07:00 ~ 08:00 → 목표출석(true), 08:01 ~ 08:30 → 노력(false)
  return total <= 8 * 60;
}

function extractRecords(j) {
  if (Array.isArray(j?.records)) return j.records;
  if (Array.isArray(j?.data?.records)) return j.data.records;
  if (Array.isArray(j?.data)) return j.data;
  if (Array.isArray(j?.list)) return j.list;
  if (Array.isArray(j?.history)) return j.history;
  return [];
}

function getTimeTextFromRecord(rec) {
  if (!rec) return '';
  if (Array.isArray(rec)) return rec[2] || rec[1] || '';
  return rec.time || rec.timestamp || rec.datetime || rec.dateTime || rec.createdAt || '';
}

function recordIsGoal(rec) {
  // 서버가 onTime을 명확히 내려주면 우선 사용
  if (typeof rec?.onTime === 'boolean') return rec.onTime;
  if (typeof rec?.isOnTime === 'boolean') return rec.isOnTime;

  // 문자열 상태값이 있는 경우 처리
  const status = String(rec?.status || rec?.type || rec?.result || '').trim();
  if (/정시|목표|on\s*time/i.test(status)) return true;
  if (/지각|노력|late|effort/i.test(status)) return false;

  // 시간값을 직접 파싱해서 08:00까지는 목표 출석, 이후는 노력으로 판단
  const t = formatRecordTime(getTimeTextFromRecord(rec));
  const m = t.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return false;
  const h = Number(m[1]), min = Number(m[2]);
  return h < 8 || (h === 8 && min === 0);
}

function readNumber(...vals) {
  for (const v of vals) {
    const n = Number(v);
    if (Number.isFinite(n)) return n;
  }
  return NaN;
}

function normalizeStudentStats(j, submittedOnTime) {
  const records = extractRecords(j);
  const d = (j && typeof j.data === 'object' && !Array.isArray(j.data)) ? j.data : {};

  // 서버가 값을 최상위 또는 data 내부 어디에 내려줘도 읽는다.
  const rawCount = readNumber(
    j?.count, j?.total, j?.totalCount, j?.recordCount,
    d?.count, d?.total, d?.totalCount, d?.recordCount
  );
  const rawGoal = readNumber(
    j?.onTimeCount, j?.goalCount, j?.ontime, j?.onTime, j?.earlyCount,
    d?.onTimeCount, d?.goalCount, d?.ontime, d?.onTime, d?.earlyCount
  );
  const rawEffort = readNumber(
    j?.lateCount, j?.effortCount, j?.late, j?.effort,
    d?.lateCount, d?.effortCount, d?.late, d?.effort
  );

  // 기록 목록이 있으면 목록 기준, 없으면 서버 요약값 기준으로 표시한다.
  let total = records.length > 0 ? records.length : (Number.isFinite(rawCount) ? rawCount : 0);
  let goalCount;
  if (records.length > 0) {
    goalCount = records.filter(recordIsGoal).length;
  } else if (Number.isFinite(rawGoal)) {
    goalCount = rawGoal;
  } else if (Number.isFinite(rawCount) && Number.isFinite(rawEffort)) {
    goalCount = Math.max(rawCount - rawEffort, 0);
  } else {
    goalCount = 0;
  }

  let effortCount;
  if (Number.isFinite(rawEffort)) {
    effortCount = rawEffort;
    if (!Number.isFinite(rawCount) && records.length === 0 && Number.isFinite(rawGoal)) total = rawGoal + rawEffort;
  } else {
    effortCount = Math.max(total - goalCount, 0);
  }

  return { total, goalCount, effortCount, records, submittedOnTime };
}

async function getStudentStatsAfterSubmit(name, cls) {
  const submittedOnTime = isOnTimeByDate(new Date());
  // 시트 반영이 약간 늦을 수 있어 짧게 재조회한다.
  for (let i = 0; i < 4; i++) {
    try {
      if (i > 0) await new Promise(resolve => setTimeout(resolve, 450));
      const j = await fetchStudentRecord(name, cls);
      if (j && j.success) return normalizeStudentStats(j, submittedOnTime);
    } catch(e) {}
  }
  // 조회 실패 시 화면만 임시 반영한다. 지각은 목표 출석에 포함하지 않는다.
  return {
    total: currentCount + 1,
    goalCount: submittedOnTime ? currentCount + 1 : currentCount,
    effortCount: submittedOnTime ? 0 : 1,
    records: [],
    submittedOnTime
  };
}

function updateTrophyView(count) {
  const safeCount = Math.max(Number(count) || 0, 0);
  const pct = Math.min(safeCount / GOAL * 100, 100);
  document.getElementById('fillInner').style.height = pct + '%';
  document.getElementById('barFill').style.width   = pct + '%';
  document.getElementById('countNum').textContent  = safeCount + '일';
  document.getElementById('countGoal').textContent = `목표: ${GOAL}일 중 ${safeCount}일 달성`;
  if (safeCount > 0) document.getElementById('shimmerLayer').classList.add('active');
  else document.getElementById('shimmerLayer').classList.remove('active');
}

function showResult(name, cls, time, stats = {}) {
  const nameLabel = name + '님';
  const submittedOnTime = stats.submittedOnTime ?? isOnTimeByDate(time);
  const effortCount = Number(stats.effortCount ?? 0) || 0;
  const is100 = currentCount >= GOAL;

  document.getElementById('popEmoji').textContent = is100 ? '🏆' : (submittedOnTime ? '✅' : '👍');
  document.getElementById('popName').textContent  = nameLabel;
  document.getElementById('popMsg').textContent   = is100 ? '🎉 30일 챌린지 완료!' : (submittedOnTime ? '🏆 목표출석 달성! / 수석합격 +1 상승하셨습니다.' : '👍 노력은 인정해드려요. / 내일은 08:00 이전에 도전해보세요.');
  document.getElementById('popTime').textContent  =
    submittedOnTime
      ? `${cls} • 등록 시각: ${time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`
      : `${cls} • 노력 ${effortCount}회 • 등록 시각: ${time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;

  if (is100) {
    document.getElementById('congratsText').innerHTML =
      `<span class="gold">${nameLabel}</span><br>` +
      `🎉 30일 챌린지 완료!<br>` +
      `<span class="small">꾸준함이 실력이 되었습니다.<br>` +
      `매일의 작은 실천이 만든 결과입니다.<br>` +
      `당신의 노력이 자랑스럽습니다. ✨</span>`;
    document.getElementById('congratsBox').style.display = 'block';
  } else if (!submittedOnTime) {
    document.getElementById('congratsText').innerHTML =
      `<span class="gold">${nameLabel}</span><br>` +
      `조금 더 빨리 오세요 😊<br>` +
      `<span class="small">노력은 인정해드려요 👍</span>`;
    document.getElementById('congratsBox').style.display = 'block';
  } else {
    document.getElementById('congratsBox').style.display = 'none';
  }

  document.getElementById('popup').classList.add('show');

  setTimeout(() => {
    updateTrophyView(currentCount);
    if (is100) {
      const wrap = document.getElementById('trophyWrap');
      wrap.classList.remove('full-shine'); void wrap.offsetWidth; wrap.classList.add('full-shine');
    }
  }, 200);

  const plus = document.getElementById('plusTag');
  plus.textContent = submittedOnTime ? '+1' : '+노력';
  plus.style.animation = 'none'; void plus.offsetWidth;
  plus.style.animation = 'floatUp 1.2s ease-out forwards';

  is100 ? repeatParticles() : spawnParticles(submittedOnTime ? 40 : 22);
}

function closePopup() {
  clearInterval(particleTimer);
  document.getElementById('particles').innerHTML = '';
  document.getElementById('popup').classList.remove('show');
  document.getElementById('nameInput').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '출석 완료 ✓';
}


function formatRecordDate(value) {
  if (!value) return '';
  const str = String(value);
  const dt = new Date(str);
  if (!isNaN(dt.getTime())) {
    return dt.toLocaleDateString('ko-KR', {
      timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit'
    }).replace(/\.\s?/g, '.').replace(/\.$/, '');
  }
  return str.replace(/\s+/g, ' ').trim();
}

function formatRecordTime(value) {
  if (!value) return '';
  const str = String(value);
  const dt = new Date(str);
  if (!isNaN(dt.getTime())) {
    return dt.toLocaleTimeString('ko-KR', {
      timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', hour12: false
    });
  }
  const m = str.match(/(오전|오후)?\s*(\d{1,2})[:시]\s*(\d{1,2})/);
  if (m) {
    let h = Number(m[2]);
    const min = String(m[3]).padStart(2, '0');
    if (m[1] === '오후' && h < 12) h += 12;
    if (m[1] === '오전' && h === 12) h = 0;
    return `${String(h).padStart(2, '0')}:${min}`;
  }
  return str.replace(/\s+/g, ' ').trim();
}

// 누가기록 열기
async function openRecord() {
  const name = lastName || document.getElementById('nameInput').value.trim();
  const cls  = lastClass || document.getElementById('classSelect').value;

  if (!name) {
    document.getElementById('errMsg').style.display = 'block';
    return;
  }

  document.getElementById('recTitle').textContent = name + '님 출석 기록';
  document.getElementById('recSub').textContent   = cls + ' • 이번 달';
  document.getElementById('recStats').style.display = 'none';
  document.getElementById('recordList').innerHTML  = '<div class="loading-msg">조회 중...</div>';
  document.getElementById('recordPopup').classList.add('show');

  try {
    const j = await fetchStudentRecord(name, cls);

    if (!j.success) { document.getElementById('recordList').innerHTML = '<div class="empty-msg">조회 실패</div>'; return; }

    const stats = normalizeStudentStats(j, false);
    const records = stats.records;
    currentCount = stats.goalCount;
    updateTrophyView(currentCount);

    document.getElementById('recTotal').textContent  = stats.total + '회';
    document.getElementById('recOnTime').textContent = stats.goalCount + '회';
    document.getElementById('recLate').textContent   = stats.effortCount + '회';
    document.getElementById('recStats').style.display = 'flex';

    if (!records || records.length === 0) {
      document.getElementById('recordList').innerHTML = '<div class="empty-msg">이번 달 출석 기록이 없어요</div>';
      return;
    }

    document.getElementById('recordList').innerHTML = records.slice().reverse().map(rec =>
      `<div class="record-item">
        <div class="datetime">
          <span class="date">${formatRecordDate(rec.date)}</span>
          <span class="time">${formatRecordTime(rec.time)}</span>
        </div>
        <span class="${recordIsGoal(rec) ? 'badge-on' : 'badge-late'}">${recordIsGoal(rec) ? '🏆 목표' : '👍 노력'}</span>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('recordList').innerHTML = '<div class="empty-msg">조회 실패. 다시 시도해주세요.</div>';
  }
}

function closeRecord() {
  document.getElementById('recordPopup').classList.remove('show');
}

function repeatParticles() {
  spawnParticles(80);
  particleTimer = setInterval(() => spawnParticles(80), 2600);
}
function spawnParticles(n) {
  const el   = document.getElementById('particles');
  el.innerHTML = '';
  const cols = ['#DAA520','#FFD700','#B8860B','#FFF8DC','#4a6cf7','#ff9999','#ff6b6b','#a78bfa','#5ce65c'];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*15}%;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()}s;animation-duration:${1.4+Math.random()*1.2}s;width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;border-radius:${Math.random()>.5?'3px':'50%'};`;
    el.appendChild(p);
  }
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSubmit();
});
